<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima Oscuro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Weather Icons -->
  <link rel="stylesheet" href="src/assets/weather-icons/css/weather-icons.min.css">
  <link rel="stylesheet" href="src/assets/weather-icons/css/weather-icons-wind.min.css">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div class="container py-5">
    <!-- Título -->
    <h1 class="text-center title mb-4">🌌 Clima Oscuro</h1>

    <!-- Barra de búsqueda -->
    <div class="input-group mb-3 position-relative">
      <input id="cityInput" type="text" class="form-control" placeholder="Escribe una ciudad...">
      <button id="searchBtn" class="btn btn-gradient">Buscar</button>
      <!-- Lista de sugerencias -->
      <ul id="suggestions" class="list-group position-absolute w-100 d-none"></ul>
    </div>

    <!-- Historial de ciudades -->
    <div id="history" class="mt-3"></div>

    <!-- Mensaje de error -->
    <div id="errorMsg" class="alert alert-danger d-none"></div>

    <!-- Spinner de carga -->
    <div id="loading" class="text-center d-none">
      <div class="spinner-border text-light" role="status"></div>
      <p class="mt-2">Cargando datos...</p>
    </div>

    <!-- Tarjeta de clima -->
    <div id="weatherCard" class="card card-dark d-none mt-4">
      <div class="card-body text-center">
        <button id="closeBtn" class="btn btn-sm btn-gradient float-end">✖</button>
        <h2 id="cityName"></h2>
        <!-- Ícono personalizado -->
        <i id="weatherIcon" class="weather-icon my-3"></i>
        <p id="description"></p>
        <p id="temperature"></p>
        <p id="humidity"></p>
      </div>
    </div>

    <!-- Pronóstico extendido -->
    <div id="forecast" class="row mt-4 d-none"></div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
