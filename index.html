<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima Oscuro | Pronóstico en Vivo</title>
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="src/assets/weather-icons/css/weather-icons.min.css">
  <link rel="stylesheet" href="src/assets/weather-icons/css/weather-icons-wind.min.css">
  
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div class="container py-5">
    <header>
      <h1 class="text-center title mb-4">🌌 Clima Oscuro</h1>
    </header>

    <section class="search-container mb-4">
      <div class="input-group position-relative" id="searchBox">
        <input 
          id="cityInput" 
          type="text" 
          class="form-control" 
          placeholder="Escribe una ciudad (ej: Madrid, ES)..."
          autocomplete="off"
        >
        <button id="searchBtn" class="btn btn-gradient" type="button">Buscar</button>
        
        <ul id="suggestions" class="list-group position-absolute w-100 shadow-lg d-none"></ul>
      </div>

      <div id="history" class="mt-3 d-flex flex-wrap gap-2"></div>
    </section>

    <section aria-live="polite">
      <div id="errorMsg" class="alert alert-danger d-none border-0 shadow-sm"></div>

      <div id="loading" class="text-center d-none my-4">
        <div class="spinner-border text-info" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2 text-info">Consultando satélites...</p>
      </div>
    </section>

    <main>
      <div id="weatherCard" class="card card-dark d-none mt-4 border-0">
        <div class="card-body text-center p-4">
          <button id="closeBtn" class="btn btn-sm btn-outline-light float-end border-0" aria-label="Cerrar">✖</button>
          <h2 id="cityName" class="display-5"></h2>
          
          <div class="icon-display my-4">
            <i id="weatherIcon" class="wi weather-icon"></i>
          </div>
          
          <p id="description" class="lead text-capitalize"></p>
          <div class="d-flex justify-content-center gap-4 mt-3">
            <p id="temperature" class="h3"></p>
            <p id="humidity" class="h3"></p>
          </div>
        </div>
      </div>

      <div id="forecast" class="row g-3 mt-4 d-none">
        </div>
    </main>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
